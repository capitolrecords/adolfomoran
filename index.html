<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Presentación</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Estilos para que tu página se vea moderna y limpia */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .tarjeta {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 550px; /* Ajustado para que tus textos largos se lee mucho mejor */
            width: 90%;
            text-align: center;
        }
        h1 {
            margin-bottom: 5px;
        }
        
        /* ==========================================
           MODIFICACIÓN: Estilo resaltado para tu nombre 
           ========================================== */
        .mi-nombre-link {
            color: #0077b5; /* Azul corporativo de LinkedIn permanente */
            text-decoration: underline; /* Subrayado obligatorio para denotar el link */
            font-weight: bold;
            transition: color 0.2s ease, opacity 0.2s ease;
        }
        .mi-nombre-link:hover {
            color: #005582; /* Un azul un poco más oscuro al pasar el mouse */
            opacity: 0.9;
        }
        /* ========================================== */

        .subtitulo {
            color: #7f8c8d;
            font-size: 1.1em;
            margin-top: 0;
        }
        .descripcion {
            line-height: 1.6;
            color: #555;
        }

        /* ==========================================
           ESTILOS: Sección de Cursos Destacados 
           ========================================== */
        .seccion-cursos {
            text-align: left; /* Alineado a la izquierda como en la imagen */
            position: relative;
            padding-bottom: 10px;
        }
        
        .
